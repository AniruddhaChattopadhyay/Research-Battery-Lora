project:
  name: schema-shield-lite
  benchmark: dice-bench
  mode: live
  output_dir: outputs/dice

model:
  name: qwen/qwen3.5-9b
  provider: openrouter
  endpoint: https://openrouter.ai/api/v1/chat/completions
  temperature: 0.0
  repair_max_tokens: 512
  provider_preferences:
    allow_fallbacks: true
    ignore:
      - Venice

data:
  dice_subset_path: data/dice_stage3_subset_300.json

drift:
  description_modes: []
  schema_modes:
    - rename_parameters
    - reorder_parameters
  candidate_modes: []
  severity: mild

evaluation:
  sample_count: 300
  seed: 42
  use_repair: true
  run_naive_retry: false
  ablation_mode: full
  repair_target_mode: predicted_tool
  unresolved_repair_mode: candidate_retry

pilot:
  demo_mode: false
  benchmark_subset: dice_ablation_schema_only_non_oracle
